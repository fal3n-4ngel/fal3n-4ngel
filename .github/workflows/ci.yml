name: API & Build Integration CI

on:
  push:
    branches:
      - release/portfolio
      - master
  pull_request:
    branches:
      - release/portfolio
      - master

jobs:
  test:
    name: Run Build & Integration Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js (v24)
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run TypeScript Type-Check
        run: npm run type-check

      - name: Run Linter
        run: npm run lint

      - name: Build Next.js Production App
        run: npm run build
        env:
          # Next.js build might expect these to build correctly, passing mock values
          NEXT_PUBLIC_SITE_URL: "http://localhost:3000"
          API_KEY: "expenses_adi_secret_9k2mXp7vLqR4"

      - name: Run Integration Tests
        run: npm run test:integration
        env:
          API_KEY: "expenses_adi_secret_9k2mXp7vLqR4"
